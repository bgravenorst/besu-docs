name: Site, tooling, or build
description: Report a docs site, tooling, dependency, workflow, or CI issue.
title: "Site: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form to suggest updates or report issues related to the site configuration, dependencies, CI, or tooling.
  - type: textarea
    id: summary
    attributes:
      label: What should be changed?
      description: Describe the site, tooling, or build issue or enhancement.
      placeholder: |
        Example: "Add feedback widget to the Besu docs. Investigate if the MetaMask docs solution can be used."
    validations:
      required: true
  - type: checkboxes
    id: issue-type
    attributes:
      label: Site issue type
      description: Select any type that applies.
      options:
        - label: Build or CI
        - label: Configuration, dependencies, or plugins
        - label: UI/UX
        - label: Navigation
        - label: Search, analytics, or metadata
        - label: Redirects or routing
        - label: AI tooling
        - label: Other
  - type: textarea
    id: source-links
    attributes:
      label: Source links
      description: Link to related issues, dependency docs, upstream changes, logs, or discussions.
      placeholder: |
        Example: "MetaMask docs solution: https://github.com/MetaMask/metamask-docs/pull/2852"
